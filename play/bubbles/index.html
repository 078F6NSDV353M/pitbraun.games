<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bubbles</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #080914;
      touch-action: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    #gameWrap {
      position: relative;
      width: min(100vw, 900px, calc(100vh * 0.75));
      height: min(100vh, 1200px, calc(100vw * 1.333333));
      aspect-ratio: 3 / 4;
      max-width: 900px;
      max-height: 1200px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(92, 45, 255, 0.28), transparent 34%),
        radial-gradient(circle at 18% 76%, rgba(0, 229, 255, 0.16), transparent 30%),
        linear-gradient(180deg, #101229 0%, #080914 58%, #060611 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 5;
    }

    .hudBox {
      min-width: 88px;
      padding: 10px 12px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(8, 9, 20, 0.46);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .hudLabel {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.58);
    }

    .hudValue {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .centerPanel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
      pointer-events: none;
    }

    .card {
      width: min(360px, 92vw);
      padding: 24px 22px;
      text-align: center;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(10, 11, 26, 0.76);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      pointer-events: auto;
    }

    .card h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: -0.04em;
    }

    .card p {
      margin: 0 auto 18px;
      max-width: 280px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 15px;
      line-height: 1.35;
    }

    .button {
      width: 100%;
      height: 54px;
      color: #071018;
      border: 0;
      background: linear-gradient(135deg, #00e5ff, #fff35c, #ff3df2);
      box-shadow: 0 14px 34px rgba(0, 229, 255, 0.25);
      border-radius: 18px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 92px;
      width: min(360px, calc(100% - 28px));
      transform: translateX(-50%);
      padding: 10px 12px;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 9, 20, 0.38);
      border-radius: 16px;
      font-size: 12px;
      text-align: center;
      z-index: 5;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    .buildVersion {
      position: absolute;
      left: 10px;
      bottom: 8px;
      z-index: 6;
      color: rgba(255, 255, 255, 0.34);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
      <div class="hudBox">
        <div class="hudLabel">Score</div>
        <div class="hudValue" id="scoreText">0</div>
      </div>
      <div class="hudBox" style="text-align:center;">
        <div class="hudLabel">Max Score</div>
        <div class="hudValue" id="maxScoreText">0</div>
      </div>
      <div class="hudBox" style="text-align:right;">
        <div class="hudLabel">Combo</div>
        <div class="hudValue" id="comboText">x1</div>
      </div>
    </div>

    <div class="centerPanel" id="menuPanel">
      <div class="card">
        <h1>BUBBLES</h1>
        <p>Tap the screen. Match the color and split the big balls into pieces.</p>
        <button class="button" id="startButton">START</button>
      </div>
    </div>

    <div class="hint hidden">Тап — выстрел. Свайп внизу или тап по цвету — быстрая смена цвета.</div>
    <div class="buildVersion">Build V47</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreText = document.getElementById('scoreText');
    const comboText = document.getElementById('comboText');
    const maxScoreText = document.getElementById('maxScoreText');
    const menuPanel = document.getElementById('menuPanel');
    const startButton = document.getElementById('startButton');

    const COLORS = [
      { name: 'cyan', value: '#00e5ff' },
      { name: 'yellow', value: '#fff35c' },
      { name: 'pink', value: '#ff3df2' },
      { name: 'green', value: '#4dff88' }
    ];

    let width = 0;
    let height = 0;
    let dpr = 1;
    let running = false;
    let lastTime = 0;
    let score = 0;
    let maxScore = Number(localStorage.getItem('bubblesMaxScore')) || 0;
    let combo = 1;
    let activeColor = 0;
    let spawnTimer = 0;
    let shake = 0;
    let wheelCenterX = 0;
    let wheelCenterY = 0;
    let wheelRadius = 0;
    let isChoosingColor = false;
    let audioContext = null;
    let musicTimer = null;
    let musicStep = 0;
    let musicGain = null;

    const player = {
      x: 0,
      y: 0,
      radius: 24
    };

    const shots = [];
    const enemies = [];
    const particles = [];
    const floatingTexts = [];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      player.x = width / 2;
      player.y = height - 40;
      wheelCenterX = player.x;
      wheelCenterY = player.y + 8;
      wheelRadius = Math.min(140, width * 0.3);
    }

    function resetGame() {
      maxScoreText.textContent = maxScore;
      score = 0;
      combo = 1;
      activeColor = 0;
      spawnTimer = 0;
      shake = 0;
      shots.length = 0;
      enemies.length = 0;
      particles.length = 0;
      floatingTexts.length = 0;
      scoreText.textContent = '0';
      comboText.textContent = 'x1';
      spawnEnemy(true);
      spawnEnemy(true);
      spawnEnemy(true);
    }

    async function startGame() {
      initAudio();

      if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
      }
      startNeonLoop();
      playClickSound();
      resetGame();
      running = true;
      menuPanel.classList.add('hidden');
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function gameOver() {
      stopNeonLoop();
      running = false;
      menuPanel.classList.remove('hidden');
      menuPanel.querySelector('h1').textContent = 'GAME OVER';
      menuPanel.querySelector('p').textContent = 'Score: ' + score + '. Try again and keep the combo.';
      startButton.textContent = 'RESTART';
    }

    function spawnEnemy(initial = false) {
      const colorIndex = Math.floor(Math.random() * COLORS.length);
      const radius = initial ? random(34, 48) : random(28, 50);
      const position = findSpawnPosition(radius, initial);

      enemies.push({
        x: position.x,
        y: position.y,
        radius,
        colorIndex,
        speed: (random(11.8404, 20.12868) + score * 0.0012) * Math.pow(radius / 26, 1.35),
        wobble: random(0, Math.PI * 2),
        hp: radius > 46 ? 2 : 1
      });
    }

    function findSpawnPosition(radius, initial) {
      const minY = initial ? 92 : -radius - 20;
      const maxY = initial ? height * 0.32 : -radius - 20;

      for (let attempt = 0; attempt < 24; attempt++) {
        const x = random(radius + 18, width - radius - 18);
        const y = initial ? random(minY, maxY) : minY;
        let overlaps = false;

        for (const enemy of enemies) {
          const safeDistance = radius + enemy.radius + 18;
          if (Math.hypot(x - enemy.x, y - enemy.y) < safeDistance) {
            overlaps = true;
            break;
          }
        }

        if (!overlaps) return { x, y };
      }

      return {
        x: random(radius + 18, width - radius - 18),
        y: initial ? random(minY, maxY) : minY
      };
    }

    function shoot(targetX, targetY) {
      if (!running) return;

      playShootSound();

      const dx = targetX - player.x;
      const dy = targetY - player.y;
      const length = Math.max(Math.hypot(dx, dy), 1);
      const speed = 760;

      shots.push({
        x: player.x,
        y: player.y,
        vx: dx / length * speed,
        vy: dy / length * speed,
        radius: 8,
        colorIndex: activeColor,
        life: 2.2
      });
    }

    function splitEnemy(enemy) {
      playPopSound(enemy.radius);

      const color = COLORS[enemy.colorIndex].value;
      const points = Math.round(enemy.radius * combo);
      score += points;
      combo = Math.min(combo + 1, 12);
      scoreText.textContent = score;
      if (score > maxScore) {
        maxScore = score;
        localStorage.setItem('bubblesMaxScore', String(maxScore));
        maxScoreText.textContent = maxScore;
      }
      comboText.textContent = 'x' + combo;
      shake = 10;

      floatingTexts.push({
        x: enemy.x,
        y: enemy.y,
        text: '+' + points,
        color,
        life: 0.8
      });

      for (let i = 0; i < 22; i++) {
        const angle = random(0, Math.PI * 2);
        const speed = random(80, 280);
        particles.push({
          x: enemy.x,
          y: enemy.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: random(2, 6),
          color,
          life: random(0.28, 0.72)
        });
      }

      if (enemy.radius > 38) {
        const count = 2;
        const childRadius = Math.max(18, enemy.radius * 0.46);
        const spread = enemy.radius * 0.72;

        for (let i = 0; i < count; i++) {
          const direction = i === 0 ? -1 : 1;
          enemies.push({
            x: Math.max(childRadius + 14, Math.min(width - childRadius - 14, enemy.x + direction * spread)),
            y: enemy.y + random(-8, 8),
            radius: childRadius,
            colorIndex: enemy.colorIndex,
            speed: (enemy.speed + random(0.5, 1)) * Math.pow(childRadius / 20, 1.25),
            wobble: random(0, Math.PI * 2),
            hp: 1
          });
        }
      }
    }

    function wrongHit(enemy) {
      playWrongHitSound();
      combo = 1;
      comboText.textContent = 'x1';
      enemy.radius = Math.min(enemy.radius + 8, 76);
      enemy.speed += 0.5;
      shake = 6;

      for (let i = 0; i < 10; i++) {
        const angle = random(0, Math.PI * 2);
        particles.push({
          x: enemy.x,
          y: enemy.y,
          vx: Math.cos(angle) * random(40, 150),
          vy: Math.sin(angle) * random(40, 150),
          radius: random(2, 4),
          color: '#ffffff',
          life: random(0.16, 0.34)
        });
      }
    }

    function update(dt) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnEnemy(false);
        spawnTimer = Math.max(1.5057495, 2.5095825 - score * 0.00003);
      }

      for (let i = shots.length - 1; i >= 0; i--) {
        const shot = shots[i];
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
        shot.life -= dt;

        if (shot.life <= 0 || shot.x < -40 || shot.x > width + 40 || shot.y < -60 || shot.y > height + 60) {
          shots.splice(i, 1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.wobble += dt * 2;
        enemy.y += enemy.speed * dt;
        enemy.x += Math.sin(enemy.wobble) * 18 * dt;

        if (enemy.y + enemy.radius >= height) {
          gameOver();
          return;
        }
      }

      for (let j = shots.length - 1; j >= 0; j--) {
        const shot = shots[j];
        let bestMatch = null;
        let bestAny = null;

        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          const distance = Math.hypot(enemy.x - shot.x, enemy.y - shot.y);

          if (distance < enemy.radius + shot.radius) {
            const hit = { enemy, index: i, distance };

            if (!bestAny || distance < bestAny.distance) {
              bestAny = hit;
            }

            if (shot.colorIndex === enemy.colorIndex && (!bestMatch || distance < bestMatch.distance)) {
              bestMatch = hit;
            }
          }
        }

        const hit = bestMatch || bestAny;
        if (!hit) continue;

        shots.splice(j, 1);

        if (shot.colorIndex === hit.enemy.colorIndex) {
          hit.enemy.hp -= 1;
          if (hit.enemy.hp <= 0) {
            enemies.splice(hit.index, 1);
            splitEnemy(hit.enemy);
          }
        } else {
          wrongHit(hit.enemy);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }

      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y -= 52 * dt;
        t.life -= dt;
        if (t.life <= 0) floatingTexts.splice(i, 1);
      }

      shake = Math.max(0, shake - 38 * dt);
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      const sx = shake ? random(-shake, shake) : 0;
      const sy = shake ? random(-shake, shake) : 0;
      ctx.save();
      ctx.translate(sx, sy);

      drawGrid();
      drawEnemies();
      drawShots();
      drawParticles();
      drawPlayer();
      drawColorButtons();
      drawFloatingTexts();

      ctx.restore();
    }

    function drawGrid() {
      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1;
      const gap = 34;

      for (let y = height % gap; y < height; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      for (let x = width % gap; x < width; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawGlowCircle(x, y, radius, color) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = radius * 0.72;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x - radius * 0.28, y - radius * 0.32, radius * 0.28, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        const color = COLORS[enemy.colorIndex].value;
        drawGlowCircle(enemy.x, enemy.y, enemy.radius, color);

        if (enemy.hp > 1) {
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.7)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(enemy.x, enemy.y, enemy.radius - 8, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawShots() {
      for (const shot of shots) {
        const color = COLORS[shot.colorIndex].value;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.44;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(shot.x, shot.y);
        ctx.lineTo(shot.x - shot.vx * 0.035, shot.y - shot.vy * 0.035);
        ctx.stroke();
        ctx.restore();
        drawGlowCircle(shot.x, shot.y, shot.radius, color);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlayer() {
      const color = COLORS[activeColor].value;
      drawGlowCircle(player.x, player.y, player.radius, color);

      ctx.save();
      ctx.fillStyle = '#071018';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawColorButtons() {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(wheelCenterX, wheelCenterY, wheelRadius, Math.PI, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      for (let i = 0; i < COLORS.length; i++) {
        const point = getColorWheelPoint(i);
        const radius = i === activeColor ? 36 : 30;
        drawGlowCircle(point.x, point.y, radius, COLORS[i].value);

        if (i === activeColor) {
          ctx.save();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(point.x, point.y, radius + 7, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function getColorWheelPoint(index) {
      const startAngle = Math.PI * 1.22;
      const endAngle = Math.PI * 1.78;
      const angle = startAngle + (endAngle - startAngle) * (index / (COLORS.length - 1));

      return {
        x: wheelCenterX + Math.cos(angle) * wheelRadius,
        y: wheelCenterY + Math.sin(angle) * wheelRadius
      };
    }

    function drawFloatingTexts() {
      for (const t of floatingTexts) {
        ctx.save();
        ctx.globalAlpha = Math.max(t.life, 0);
        ctx.fillStyle = t.color;
        ctx.font = '800 22px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = t.color;
        ctx.shadowBlur = 12;
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
      }
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function initAudio() {
      if (audioContext) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      audioContext = new AudioContextClass();
    }

    function playTone(frequency, duration, type, volume, slideTo = null) {
      if (!audioContext) return;

      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);

      if (slideTo !== null) {
        oscillator.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }

      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + duration);
    }

    function playShootSound() {
      playTone(520, 0.055, 'sine', 0.135, 780);
    }

    function playClickSound() {
      playTone(980, 0.018, 'sine', 0.05, 760);
      playTone(620, 0.03, 'triangle', 0.035, 420);
    }

    function playPopSound(radius) {
      const base = Math.max(90, 260 - radius * 2.2);
      const sizeBoost = Math.min(0.11, radius / 520);
      playTone(base + random(-18, 18), 0.105, 'sine', 0.21 + sizeBoost, base * 0.55);
      playTone(base * 1.8 + random(-24, 24), 0.045, 'triangle', 0.105, base * 1.1);
    }

    function playWrongHitSound() {
      playTone(240, 0.08, 'sawtooth', 0.07, 180);
      playTone(140, 0.12, 'triangle', 0.045, 110);
    }

    function startNeonLoop() {
      if (!audioContext || musicTimer) return;

      if (!musicGain) {
        musicGain = audioContext.createGain();
        musicGain.gain.value = 0.16;
        musicGain.connect(audioContext.destination);
      }

      musicStep = 0;
      playNeonStep();
      musicTimer = setInterval(playNeonStep, 620);
    }

    function stopNeonLoop() {
      if (!musicTimer) return;
      clearInterval(musicTimer);
      musicTimer = null;
    }

    function playNeonStep() {
      if (!audioContext || !musicGain) return;

      const notes = [220, 277.18, 329.63, 415.3, 329.63, 277.18, 246.94, 329.63];
      const bassNotes = [55, 55, 69.3, 69.3, 82.41, 82.41, 61.74, 61.74];
      const note = notes[musicStep % notes.length];
      const bass = bassNotes[musicStep % bassNotes.length];
      const now = audioContext.currentTime;

      playMusicTone(note, 0.42, 'sine', 0.24, note * 0.995, now);

      if (musicStep % 2 === 0) {
        playMusicTone(bass, 0.58, 'triangle', 0.18, bass * 0.98, now);
      }

      musicStep += 1;
    }

    function playMusicTone(frequency, duration, type, volume, slideTo, startTime) {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      oscillator.frequency.exponentialRampToValueAtTime(slideTo, startTime + duration);

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1200, startTime);

      gain.gain.setValueAtTime(0.001, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + 0.035);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

      oscillator.connect(filter);
      filter.connect(gain);
      gain.connect(musicGain);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration);
    }

    function handlePointerDown(event) {
      event.preventDefault();

      const point = getCanvasPoint(event);

      for (let i = 0; i < COLORS.length; i++) {
        const colorPoint = getColorWheelPoint(i);
        const distance = Math.hypot(point.x - colorPoint.x, point.y - colorPoint.y);

        if (distance <= 50) {
          isChoosingColor = true;
          activeColor = i;
          playClickSound();
          return;
        }
      }

      shoot(point.x, point.y);
    }

    function handlePointerMove(event) {
      if (!isChoosingColor) return;
      event.preventDefault();

      const point = getCanvasPoint(event);
      updateColorFromWheel(point.x, point.y);
    }

    function handlePointerUp() {
      isChoosingColor = false;
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function updateColorFromWheel(x, y) {
      const dx = x - wheelCenterX;
      const dy = y - wheelCenterY;
      const distToCenter = Math.hypot(dx, dy);

      // Only react if pointer is near the wheel arc (ring area)
      const ringMin = wheelRadius - 40;
      const ringMax = wheelRadius + 40;
      if (distToCenter < ringMin || distToCenter > ringMax) return;

      let closestIndex = -1;
      let closestDistance = Infinity;

      for (let i = 0; i < COLORS.length; i++) {
        const point = getColorWheelPoint(i);
        const distance = Math.hypot(x - point.x, y - point.y);

        if (distance < closestDistance) {
          closestDistance = distance;
          closestIndex = i;
        }
      }

      // Only switch if close enough to a color node
      if (
        closestIndex !== -1 &&
        closestDistance < 40 &&
        activeColor !== closestIndex
      ) {
        activeColor = closestIndex;
        playClickSound();
      }
    }

    window.addEventListener('resize', resize);
    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);
    startButton.addEventListener('click', startGame);

    maxScoreText.textContent = maxScore;
    resize();
    draw();
  </script>
</body>
</html>
